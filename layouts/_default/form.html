{{ define "main" }}
<!-- Main Content -->
<main class="main-content">
  <section class="section pb-5 pt-2">
    <div dir="rtl" class="container">
      <div style="margin: auto; padding-right: 10%; padding-left: 5%">
        <div dir="rtl" class="row gap-y">
          <div class="col-md-6 text-right news">
            <div class="alert alert-warning" role="alert">
  در صورت تمایل می توانید از طریق <a href="#" class="alert-link">فرم زیر یا شبکه های اجتماعی</a>. با بنده تماس بگیرید.
</div>
 <div class="form-group">
            
         <div class="form-group col-md-6">     
    {{ if (index page.Params.forms 0) }}
  {{ partial "form.html" (dict "context" . "form" 0) }}
{{ end }}
             
             </div>
      </div>


    </div>
  </section>
</main>


{{ end }}
