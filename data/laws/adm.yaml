articles:
- number: 1
  text: 'هيچ حكمي از احكام دادگاههاي دادگستري بموقع اجرا گذارده نميشود مگر اينكه قطعي
    شده يا قرار اجراي موقت آن در موارديكه‌ قانون معين ميكند صادر- 1 ماده

    .شده باشد'
- number: 2
  text: 'احكام دادگاههاي دادگستري وقتي بموقع اجرا گذارده ميشود كه بمحكوم‌ عليه يا
    وكيل يا قائم ‌مقام قانوني او ابالغ شده و محكوم‌ له يا ‌نماينده و يا قائم ‌مقام-
    2 ماده

    .قانوني او كتبا اين تقاضا را از دادگاه بنمايد'
- number: 3
  text: . حكمي كه موضوع آن معين نيست قابل اجراء نمي‌ باشد- 3 ماده
- number: 4
  text: '. اجراي حكم با صدور اجرائيه بعمل ميآيد مگر اين كه در قانون ترتيب ديگري مقرر
    شده باشد- 4 ماده

    در موارديكه دادگاه جنبه اعالمي داشته و مستلزم انجام عملي از طرف محكوم‌ عليه نيست
    از قبيل اعالم اصالت يا بطالن سند اجرائيه صادر نميشود‌ همچنين در

    موارديكه سازمانها و مؤسسات دولتي و وابسته بدولت طرف دعوي نبوده ولي اجراي حكم بايد
    بوسيله آنها صورت گيرد صدور ‌اجرائيه الزم نيست و سازمانها و

    .مؤسسات مزبور مكلفند بدستور دادگاه حكم را اجرا كنند

    . صدور اجرائيه با دادگاه نخستين است- 5 ‌ماده'
- number: 6
  text: 'در اجرائيه نام و نام خانوادگي و محل اقامت محكوم‌ له و محكوم‌ عليه و مشخصات
    حكم و موضوع آن و اينكه پرداخت حق اجرا بعهده‌ محكوم‌ عليه ميباشد- 6 ماده

    .نوشته شده و بامضاء رئيس دادگاه و مدير دفتر رسيده بمهر دادگاه ممهور و براي ابالغ
    فرستاده ميشود'
- number: 7
  text: 'برگهاي اجرائيه بتعداد محكوم‌ عليهم بعالوه دو نسخه صادر ميشود يك نسخه از آن
