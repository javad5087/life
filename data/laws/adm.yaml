    .اجرائي بايگاني ميگردد و يك نسخه نيز در موقع ابالغ بمحكوم‌ عليه داده ميشود'
- number: 8
  text: 'ابالغ اجرائيه طبق مقررات آئين دادرسي مدني بعمل ميآيد و آخرين محل ابالغ بمحكوم‌
    عليه در پرونده دادرسي براي ابالغ اجرائيه ‌سابقه ابالغ محسوب- 8 ماده

    .است'
- number: 9
  text: 'قانون آئين دادرسي مدني بعمل آمده و تا قبل از صدور اجرائيه محكوم‌ عليه‌ محل
    اقامت خود را بدادگاه100  در موارديكه ابالغ اوراق راجع بدعوي طبق ماده- 9 ماده

    اين قانون آگهي ميگردد و ده روز پس از آن‌ بموقع اجرا گذاشته ميشود. در اين صورت
    براي119  و118 اعالم نكرده باشد مفاد اجرائيه يك نوبت بترتيب مقرر در مادتين

    عمليات اجرائي ابالغ يا اخطار ديگري به محكوم‌ عليه الزم نيست مگر اينكه محكوم‌ عليه
    محل‌ اقامت خود را كتبًا بقسمت اجرا اطالع دهد. مفاد اين ماده بايد در آگهي

    .مزبور قيد شود'
- number: 10
  text: 'اگر محكوم‌ عليه قبل از ابالغ اجرائيه محجور يا فوت شود اجرائيه حسب مورد به
    ولي، قيم، امين، وصي، ورثه يا مدير تركه او ابالغ‌ ميگردد و هرگاه حجر يا فوت- 10
