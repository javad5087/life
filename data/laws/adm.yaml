- number: 34
  text: 'همينكه اجرائيه بمحكوم‌ عليه ابالغ شد محكوم‌ عليه مكلف است ظرف ده روز مفاد
    آنرا بموقع اجرا بگذارد يا ترتيبي براي پرداخت ‌محكوم به بدهد يا مالي- 34 ماده

    معرفي كند كه اجرا حكم و استيفاء محكوم به از آن ميسر باشد و در صورتيكه خود را قادر
    باجراي مفاد اجرائيه نداند بايد‌ ظرف مهلت مزبور صورت جامع دارائي خود

    را بقسمت اجرا تسليم كند و اگر مالي ندارد صريحًا اعالم نمايد هرگاه ظرف سه سال بعد
    از انقضاء مهلت مذكور ‌معلوم شود كه محكوم‌ عليه قادر باجراي حكم و

