    تبصره'
- number: 35
  text: 'بدهكاري كه در مدت مذكور قادر بپرداخت بدهي خود نبوده مكلف است هر موقع كه به
    تأديه تمام يا قسمتي از بدهي خود متمكن گردد آن را بپردازد و- 35 ماده

