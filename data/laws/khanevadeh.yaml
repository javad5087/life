slug: khanevadeh
title: "قانون حمایت خانواده"
approved_date: "1346/03/25"
notes: "با اصلاحات و الحاقات بعدی — مصوب ۱۳۵۳/۱۱/۱۵ (نسخه اصلاح‌شده)"
articles:
  - number: 1
    text: >-
      بکلیه اختلافات مدنی ناشی از امر زناشوئی و دعاوی خانوادگی در دادگاههای
      شهرستان و در نقاطی که دادگاه شهرستان نباشد در دادگاه بخش بدون رعایت
      تشریفات قانون آئین دادرسی مدنی رسیدگی خواهد شد.
  - number: 2
    text: >-
      منظور از دعاوی خانوادگی دعاوی مدنی بین هر یک از زن و شوهر و فرزندان و
      جد پدری و وصی و قیم است که از حقوق و تکالیف مقرر در کتاب هفتم (در نکاح
      و طلاق) و کتاب هشتم (در اولاد) و کتاب نهم (در خانواده) و کتاب دهم (در
      حجر و قیومیت) قانون مدنی و همچنین از مواد 1005 و 1006 و 1028 و 1029 و
      1030 قانون مذکور و نیز از مواد مربوطه در قانون امور حسبی ناشی شده باشد.
  - number: 3
    text: >-
      دادگاه میتواند هر نوع تحقیق و اقدامی را که برای روشن شدن موضوع دعوی و
      احقاق حق لازم بداند از قبیل تحقیق از گواهان و مطلعین و استمداد از
      مددکاران اجتماعی و غیره به هر طریق که مقتضی باشد انجام دهد.
  - number: 4
    text: >-
      دادگاه هر یک از طرفین را که بی‌بضاعت تشخیص دهد از پرداخت هزینه دادرسی
      و حق کارشناسی و حق داوری و سایر هزینه‌ها معاف نموده و همچنین راساً
      وکیل معاضدتی برای او تعیین خواهد کرد. در صورتیکه طرف بی‌بضاعت
      محکوم‌له شود محکوم علیه بموجب رأی دادگاه ملزم به پرداخت هزینه‌های
      مذکور و حق‌الوکاله وکیل معاضدتی خواهد گردید.
  - number: 5
    text: >-
      وکلا و کارشناسان مذکور در ماده فوق مکلف به انجام دستور دادگاه میباشند.
  - number: 6
    text: >-
      دادگاه مکلف است بتقاضای هر یک از طرفین موضوع دعوی را به استثنای
      رسیدگی به اصل نکاح و طلاق به یک تا سه داور ارجاع نماید و مدت اعلام
      نظر داوران بتعیین دادگاه خواهد بود. در صورتی که دادگاه تشخیص دهد که
      تقاضای مذکور برای فرار از رسیدگی و اطاله کار است از قبول تقاضا
      خودداری خواهد کرد. دادرسی در این قانون تابع شرایط داوری مندرج در
      قانون آئین دادرسی مدنی نمیباشد.
  - number: 7
    text: >-
      داور یا داوران سعی در سازش بین طرفین خواهند کرد و در صورتیکه موفق به
      اصلاح نشوند رأی خود را در ماهیت دعوی ظرف مدت مقرر صادر و بدادگاه
      تسلیم خواهند کرد. رأی داور وسیله دادگاه بطرفین ابلاغ میشود و در مدت
      ده روز از تاریخ ابلاغ قابل اعتراض است. در صورتیکه طرفین برای داوری
      تسلیم باشند یا در موعد مقرر اعتراضی نکنند رأی بمورد اجرا گذاشته
      خواهد شد؛ در صورت اعتراض دادگاه در جلسه فوق‌العاده به اعتراضات
      رسیدگی کرده و رأی صادر مینماید و این رأی قطعی است. در صورت عدم وصول
      رأی داوران تا پایان مدت مقرر دادگاه در ماهیت امر رسیدگی کرده و رای
      خواهد داد.
  - number: 8
    text: >-
      اجرای صیغه طلاق پس از رسیدگی دادگاه و صدور گواهی عدم امکان سازش صورت
      خواهد گرفت. متقاضی گواهی عدم امکان سازش باید تقاضانامه‌ای بدادگاه
      تسلیم نماید. در تقاضانامه مذکور باید علل تقاضا به طور موجه قید گردد.
      پس از وصول تقاضانامه دادگاه راساً یا در صورتیکه مقتضی بداند بوسیله
      داور یا داوران سعی در اصلاح بین شوهر و زن و جلوگیری از وقوع طلاق
      خواهد کرد. هرگاه مساعی دادگاه برای حصول سازش بنتیجه نرسد دادگاه
      گواهی عدم امکان سازش را صادر خواهد کرد. دفتر طلاق پس از دریافت گواهی
      مذکور به اجرای صیغه طلاق و ثبت آن اقدام خواهد کرد.
  - number: 9
    text: >-
      در مواردی که برای طلاق بین زن و شوهر توافق شده باشد طرفین باید توافق
      خود را بدادگاه اعلام کنند و دادگاه گواهی عدم امکان سازش را صادر
      خواهد کرد. هرگاه زوجین در اعلامی که بدادگاه میکنند ترتیب اطمینان
      بخشی برای نگاهداری اطفال و پرداخت هزینه آنان پیش‌بینی نکرده باشند
      دادگاه طبق ماده 13 این قانون عمل خواهد کرد. در صورتیکه ترتیب نگاهداری
      اطفال که از طرف زوجین داده شده پس از وقوع طلاق بر هم بخورد دادگاه
      بنا بر اعلام یکی از والدین یا اقربای طفل و یا دادستان شهرستان طبق
      ماده 13 این قانون عمل خواهد کرد.
  - number: 10
    text: >-
      در مورد ماده 4 قانون ازدواج نیز در صورتیکه زن بخواهد بوکالت از طرف
      شوهر خود را مطلقه نماید باید طبق ماده 8 گواهی عدم امکان سازش از
      دادگاه تحصیل کند.
  - number: 11
    text: >-
      علاوه بر موارد مذکور در قانون مدنی در موارد زیر نیز زن یا شوهر بر
      حسب مورد میتواند از دادگاه تقاضای صدور گواهی عدم امکان سازش کند:
      ۱- در صورتی که زن یا شوهر به حکم قطعی به مجازات پنج سال حبس یا بیشتر
      یا به جریمه که بر اثر عجز از پرداخت منجر به پنج سال حبس شود و یا
      بحبس و جریمه‌ای که مجموعاً منتهی به پنج سال حبس یا بیشتر شود محکوم
      گردد و حکم حبس یا جریمه در حال اجراء باشد.
      ۲- ابتلا بهر گونه اعتیاد مضری که به تشخیص دادگاه باساس زندگی خانواده
      خلل وارد آورد و ادامه زندگی زناشویی را غیر ممکن سازد.
      ۳- هرگاه زوج بدون رضایت زوجه همسر دیگری اختیار کند.
      ۴- هرگاه یکی از زوجین زندگی خانوادگی را ترک کند؛ تشخیص ترک زندگی
      خانواده با دادگاه است.
      ۵- در صورتیکه هر یک از زوجین در اثر ارتکاب جرمی که مغایر حیثیت
      خانوادگی و شئون طرف دیگر باشد به حکم قطعی در دادگاه محکوم شود.
      تشخیص اینکه جرمی مغایر حیثیت و شئون خانوادگی است با توجه بوضع و
      موقع طرفین و عرف و موازین دیگر با دادگاه میباشد.
  - number: 12
    text: >-
      در کلیه مواردی که اختلاف زناشوئی منجر بصدور گواهی عدم امکان سازش
      می‌شود دادگاه چگونگی نگاهداری اطفال و میزان نفقه ایام عده را با
      توجه بوضع اخلاقی و مالی طرفین و مصلحت اطفال معین و مقرر میکند.
      دادگاه مکلف است ضمن صدور گواهی عدم امکان سازش تکلیف نگاهداری
      فرزندان را پس از طلاق تعیین کند و اگر قرار باشد فرزندان نزد مادر یا
      شخص دیگری بمانند ترتیب نگاهداری و میزان هزینه آنان را مشخص بسازد.
      نفقه زوجه از عواید و دارائی مرد و نفقه اولاد از عواید و دارائی مرد
      یا زن و یا هر دو حتی از حقوق بازنشستگی استیفا خواهد گردید. دادگاه
      مبلغی را که باید از عواید یا دارائی مرد یا زن یا هر دو برای هر
      فرزند استیفاء گردد تعیین و طریقه اطمینان بخشی برای پرداخت آن مقرر
      میکند. دادگاه همچنین ترتیب ملاقات اطفال را برای طرفین معین میکند.
      حق ملاقات با طفل در صورت غیبت یا فوت پدر یا مادر باقربای طبقه اول
      غایب یا متوفی منتقل خواهد شد. اطفالی که والدین آنان قبل از تصویب
      این قانون از یکدیگر جدا شده‌اند در صورتی بطریق اطمینان بخشی ترتیب
      هزینه نگاهداری و حضانت آنان داده نشده باشد مشمول مقررات این قانون
      خواهند بود.
  - number: 13
    text: >-
      در هر مورد که دادگاه حسب اعلام یکی از والدین یا اقربای اطفال و یا
      دادستان شهرستان تشخیص دهد که تجدید نظر راجع به حضانت طفل ضرورت دارد
      نسبت به تصمیم قبلی خود تجدید نظر خواهد کرد. در این موارد دادگاه
      میتواند حضانت طفل را به هر کس که مقتضی بداند محول کند ولی در هر حال
      هزینه حضانت به عهده کسی است که بموجب تصمیم دادگاه مکلف به پرداخت
      می‌شود.
  - number: 14
    text: >-
      هرگاه مرد بخواهد با داشتن زن همسر دیگری اختیار نماید باید از دادگاه
      تحصیل اجازه کند. دادگاه وقتی اجازه اختیار همسر تازه خواهد داد که با
      انجام اقدامات ضروری و در صورت امکان تحقیق از زن فعلی توانایی مالی
      مرد و قدرت او را به اجرای عدالت احراز کرده باشد. هرگاه مردی بدون
      تحصیل اجازه از دادگاه مبادرت به ازدواج نماید به مجازات مقرر در ماده
      5 قانون ازدواج مصوب 1310-1316 محکوم خواهد شد.
  - number: 15
    text: >-
      شوهر میتواند با تأیید دادگاه زن خود را از اشتغال به هر شغلیکه منافی
      مصالح خانوادگی یا حیثیات خود یا زن باشد منع کند.
  - number: 16
    text: >-
      تصمیم دادگاه در موارد زیر قطعی است و در سایر موارد فقط پژوهش‌پذیر
      می‌باشد: ۱- صدور گواهی عدم امکان سازش. ۲- تعیین نفقه ایام عده و
      هزینه نگاهداری اطفال. ۳- حضانت اطفال. ۴- حق ملاقات پدر یا مادر یا
      اقربای طبقه اول غایب یا متوفی با طفل یا اطفال. ۵- اجازه مقرر در
      ماده 14.
  - number: 17
    text: >-
      مقررات ماده 11 به صورت شرایط ضمن‌العقد در ورقه عقد ازدواج قید و در
      این مواد وکالت بلاعزل...
    note: "متن این ماده در سند منبع ناقص بود؛ لطفاً ادامه را تکمیل کنید."
