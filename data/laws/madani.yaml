slug: madani
title: "قانون مدنی"
approved_date: "1307/02/18"
notes: "با اصلاحات و الحاقات بعدی — منتشرشده در چند جلد از سال ۱۳۰۷ تا ۱۳۱۴"
articles:
  - number: 1
    text: >-
      مقدمه
در انتشار و آثار و اجراء قوانين بطور عموم

ماده 1 (اصلاحي 14ˏ08ˏ1370)- مصوبات مجلس شوراي اسلامي و نتيجه همه پرسي پس از طي مراحل قانوني به رئيس جمهور ابلاغ مي شود. رئيس جمهور بايد ظرف مدت پنج روز آن را امضاء و به مجريان ابلاغ نمايد و دستور انتشار آن را صادر كند و روزنامه رسمي موظف است ظرف مدت 72 ساعت پس از ابلاغ منتشر نمايد.
تبصره (اصلاحي 14ˏ08ˏ1370)- در صورت استنكاف رئيس جمهور از امضاء يا ابلاغ در مدت مذكور در اين ماده به دستور رئيس مجلس شوراي اسلامي روزنامه رسمي موظف است ظرف مدت 72 ساعت مصوبه را چاپ و منتشر نمايد
  - number: 2
    text: >-
     ماده 2 (اصلاحي 29ˏ08ˏ1348)- قوانين پانزده روز پس از انتشار در سراسر كشور لازم الاجرا است مگر آنكه در خود قانون ترتيب خاصي براي موقع اجرا مقرر شده باشد.
  - number: 3
    text: >-
      انتشار قوانين بايد در روزنامه رسمي بعمل آيد.
