law:
  title: قانون مدنی
  category: حقوق مدنی
  articles_count: 1354
sections:
- id: madani-1-50
  title: مواد 1 تا 50 قانون مدنی
  from: 1
  to: 50
  articles:
  - number: 1
    text: 'مصوبات مجلس شوراي اسلامی و نتیجه ي همه پرسی پس از طی مراحل قانونی به رئیس
      جمهور ابلاغ می شود . رئیس جمهور باید ظرف مدت پنج روز آن را امضا و به مجریان
      ابلاغ نماید و دستور انتشار آن را صادر کند و روزنامه ي رسمی موظف است ظرف مدت
      72 ساعت پس از ابلاغ، منتشر نماید . تبصره : در صورت استنکاف رئیس جمهور از امضا
      یا ابلاغ در مدت مذکور در این ماده به دستور رئیس مجلس شوراي اسلامی روزنامه ي
      رسمی موظف است ظرف مدت 72 ساعت مصوبه را چاپ و منتشر نماید .'
  - number: 2
    text: قوانین ، پانزده روز پس از انتشار، در سراسر کشور لازم الاجرا است مگر آن که
      در خود قانون، ترتیب خاصی براي موقع اجرا مقرر شده باشد .
  - number: 3
    text: انتشار قوانین باید در روزنامه ي رسمی به عمل آید .
  - number: 4
    text: اثر قانون نسبت به آتیه است و قانون نسبت به ماقبل خود اثر ندارد مگر ا ین
      که در خود قانون، مقررات خاصی نسبت به این موضوع اتخاذ شده باشد .
  - number: 5
    text: کلیه ي سکنه ایران، اعم از اتباع داخله و خارجه، مطیع قوانین ایران خواهند
      بود، مگر در مواردي که قانون استثنا کرده باشد .
  - number: 6
    text: قوانین مربوط به احوال شخصیه، از قبیل نکاح و طلاق و اهلیت ا شخاص و ارث، در
      مورد کلیه ي اتباع ایران، ولو این که مقیم در خارجه باشند، مجري خواهد بود .
  - number: 7
    text: اتباع خارجه مقیم در خاك ایران، از حیث مسائل مربوطه به احوال شخصیه و اهلیت
      خود و همچنین از حیث حقوق ارثیه، در حدود معاهدات، مطیع قوانین و مقررات دولت متبوع
      خود خواهند بود . ٢
  - number: 8
    text: اموال غیرمنقوله که اتباع خارجه در ایران بر طبق عهود، تملک کرده یا می کنند
      از هر جهت تابع قوانین ایران خواهد بود .
  - number: 9
    text: مقررات عهودي که بر طبق قانون اساسی بین دولت ایران و سایر دول، منعقد شده
      باشد در حکم قانون است .
  - number: 10
    text: قراردادهاي خ صوصی نسبت به کسانی که آن را منعقد نموده اند، در صورتی که مخالف
      صریح قانون نباشد، نافذ است . باب اول - در بیان انواع اموال
  - number: 11
    text: 'اموال بر دو قسم است : منقول و غیرمنقول . فصل اول - در اموال غیرمنقول'
  - number: 12
    text: مال غیرمنقول آن است که از محلی به محل دیگر نتوان نقل نمود، اعم از این که
      استقرار آن ذاتی باشد یا به واسطه ي عمل انسان، به نحوي که نقل آن مستلزم خرابی
      یا نقص خود مال یا محل آن شود .
  - number: 13
    text: اراضی و ابنیه و آسیا و هر چه که در بنا منصوب و عرفاً جزء بنا محسوب می شود،
      غیرمنقول است و همچنین است لوله ها که براي جریان آب یا مقاصد دیگر در زمین یا
      بنا کشیده شده باشد .
  - number: 14
    text: آینه و پرده ي نقاشی و مجسمه و امثال آن ها، در صورتی که در بنا یا زمین به
      کار رفته باشد، به طوري که نقل آن موجب نقص یا خرابی خود آن یا محل آن بشود، غیرمنقول
      است .
  - number: 15
    text: ثمره و حاصل، مادام که چیده یا درو نشده است غیرمنقول است . اگر قسمتی از آن
      چیده یا درو شده باشد، تنها آن قسمت منقول است .
  - number: 16
    text: مطلق اشجار و شاخه هاي آن و نهال و قلمه، مادام که بریده یا کنده نشده است،
      غیرمنقول است . ٣
  - number: 17
    text: حیوانات و اشیایی که مالک آن را براي عمل زراعت اخت صاص داده باشد، از قبیل
      گاو و گاومیش و ماشین و اسباب و ادوات زراعت و تخم و غیره و به طور کلی هر مال
      منقول که براي استفاده از عمل زراعت، لازم و مالک آن را به این امر تخصیص داده
      باشد، از جهت صلاحیت محاکم و توقیف اموال، جزو ملک محسوب و در حکم مال غیرمنقول
      است و همچنین است تلمبه و گاو و یا حیوان دیگري که براي آبیاري زراعت یا خانه و
      باغ اختصاص داده شده است .
  - number: 18
    text: حق انتفاع از اشیاي غیرمنقول ، مثل حق عمري و سکنی و همچنین حق ارتفاق نسبت
      به ملک غیر، از قبیل حق العبور وحق المجري و دعاوي راجعه به اموال غیرمنقوله، ا
      ز قبیل تقاضاي خلع ید و امثال آن، تابع اموال غیرمنقول است . فصل دوم - در اموال
      منقوله
  - number: 19
    text: اشیایی که نقل آن از محلی به محل دیگر ممکن باشد بدون این که به خود یا محل
      آن خرابی وارد آید، منقول است .
  - number: 20
    text: کلیه ي دیون، از قبیل قرض و ثمن مبیع و مال الاجاره عین مستأجره از حیث صلاحیت
      محاکم، در حکم منقول است ولو این که مبیع یا عین مستاجره از اموال غیرمنقوله باشد
      .
  - number: 21
    text: انواع کشتی هاي کوچک و بزرگ و قایق ها و آسیاها و حمام هایی که در روي رودخانه
      و دریاها ساخته می شود و می توان آن ها را حرکت داد و کلیه ي کارخانه هایی که نظر
      به طرز ساختمان، جزو بناي عمارتی نباشد داخل در منقولات است ولی توقیف بعضی از
      اشیا مزبوره ممکن است نظر به اهمیت آن ها موافق ترتیبات خاصه به عمل آید .
  - number: 22
    text: مصالح بنایی از قبیل سنگ و آجر و غیره، که براي بنایی تهیه شده یا به واسطه
      ي خرابی از بنا جدا شده باشد مادامی که در بنا به کار نرفته، داخل منقول است .
      فصل سوم - در اموالی که مالک خاص ندارد
  - number: 23
    text: استفاده از اموالی که مالک خاص ندارد مطابق قوانین مربوطه به آن ها خواهد بود
      .
  - number: 24
    text: هیچ کس نمی تواند طرق و شوارع عامه و کوچه هایی را که آخر آن ها مس دود نیست
      تملک ٤ نماید .
  - number: 25
    text: هیچ کس نمی تواند اموالی را که مورد استفاده ي عموم است و مالک خاص ندارد از
      قبیل پل ها و کاروانسراها و آب انبارهاي عمومی و مدارس قدیمه و میدان گاه هاي عمومی،
      تملک کند . و همچنین است قنوات و چاه هایی که مورد استفاده عموم است .
  - number: 26
    text: اموال دولتی که معد است براي مصالح یا انتفاعات عمومی، مثل استحکامات و قلاع
      و خندق ها و خاکریزهاي نظامی و قورخانه و اسلحه و ذخیره و سفاین جنگی و همچنین
      اثاثیه و ابنیه و عمارات دولتی و سیم هاي تلگرافی دولتی و موزه ها و کتابخانه هاي
      عمومی و آثار تاریخی و امثال آن ها و بالجمله آن چه که از اموال منقوله و غیرمنقوله
      که دولت به عنوان مصالح عمومی و منافع ملی در تحت تصرف دارد، قابل تملک خصوصی نیست
      و همچنین است اموالی که موافق مصالح عمومی به ایالت یا ولایت یا ناحیه یا شهري
      اختصاص یافته باشد .
  - number: 27
    text: اموالی که ملک اشخاص نمی باشد و افراد مردم می توانند آن هارا مطابق مقررات
      مندرجه در این قانون و قوانین مخصوصه مربوطه به هر یک از اقسام مختلفه ي آن ها
      تملک کرده و یا از آن ها استفاده کنند مباحات نامیده می شود مثل اراضی موات یعنی
      زمین هایی که معطل افتاده و آبادي و کشت و زرع در آن ها نباشد .
  - number: 28
    text: اموال مجهول المالک با اذن حاکم یا مأذون از قبل او به مصارف فقرا می رسد .
      باب دوم - در حقوق مختلفه که براي اشخاص نسبت به اموال است
  - number: 29
    text: 'ممکن است اشخاص نسبت به اموال علاقه هاي ذیل را دارا باشند : 1 - مالکیت )
      اعم از عین یا منفعت ( 2 - حق انتفاع 3 - حق ارتفاق به ملک غیر فصل اول - در مالکیت'
  - number: 30
    text: هر مالکی نسبت به مایملک خود حق همه گونه تصرف و انتفاع دارد، مگر در مواردي
      که قانون استثنا کرده باشد .
  - number: 31
    text: ٥ هیچ مالی را از تصرف صاحب آن نمی توان بیرون کرد مگر به حکم قانون .
  - number: 32
    text: تمام ثمرات و متعلقات اموال منقوله و غیرمنقوله که طبعاً یا در نتیجه ي عملی
      حاصل شده باشد، بالتبع، مال مالک اموال مزبوره است .
  - number: 33
    text: نما و محصولی که از زمین حاصل می شود، مال مالک زمین است، چه به خودي خود روییده
      باشد یا به واسطه ي عملیات مالک، مگر این که نما یا حاصل، از اصله یا حبه ي غیر
      حاصل شده باشد، که در این صورت، درخت و محصول، مال صاحب اصله یا حبه خواهد بود،
      اگر چه بدون رضاي صاحب زمین کاشته شده باشد .
  - number: 34
    text: نتاج حیوانات در ملکیت، تابع مادر است و هر کس مالک مادر شد، مالک نتاج آن
      هم خواهد شد .
  - number: 35
    text: تصرف به عنوان مالکیت، دلیل مالکیت است، مگر این که خلاف آن ثابت شود .
  - number: 36
    text: تصرفی که ثابت شود ناشی از سبب مملک یا ناقل قانونی نبوده معتبر نخواهد بود
      .
  - number: 37
    text: اگر متصرف فعلی، اقرار کند که ملک، سابقاً مال مدعی او بوده است، در این صورت
      مشارالیه نمی تواند براي رد ادع اي مالکیت شخص مزبور، به تصرف خود استناد کند مگر
      این که ثابت نماید که ملک به ناقل صحیح به او منتقل شده است .
  - number: 38
    text: مالکیت زمین مستلزم مالکیت فضاي محاذي آن است تا هر کجا بالا رود و همچنین
      است نسبت به زیر زمین بالجمله مالک حق همه گونه تصرف در هوا و قرار دا رد مگر آن
      چه را که قانون استثنا کرده باشد .
  - number: 39
    text: هر بنا و درخت که در روي زمین است و همچنین هر بنا و حفري که در زیر زمین است
      ملک مالک آن زمین محسوب می شود مگر این که خلاف آن ثابت شود . فصل دوم - در حق
      انتفاع
  - number: 40
    text: حق انتفاع عبارت از حقی است که به موجب آن شخص می تواند از مالی که عین آن
      ملک دیگري است یا مالک خاصی ندارد استفاده کند . ٦ مبحث اول - در عمري و رقبی و
      سکنی
  - number: 41
    text: مري حق انتفاعی است که به موجب عقدي از طرف مالکع براي شخص به مدت عمر خود
      یا عمر منتفع و یا عمر شخص ثالثی برقرار شده باشد .
  - number: 42
    text: قبیر حق انتفاعی است که از طرف مالک براي مدت معینی برقرار می گردد .
  - number: 43
    text: اگر حق انتفاع عبارت از سکونت در مسکنی باشد سکنی یا حق سکنی نامیده می شود
      و این حق ممکن است به طریق عمري یا به طریق رقبی برقرار شود .
  - number: 44
    text: در صورتی که مالک براي حق انتفاع مدتی معین نکرده باشد حبس، مطلق بوده و حق
      مزبور تا فوت مالک خواهد بود مگر این که مالک قبل از فوت خود رجوع کند .
  - number: 45
    text: در موارد فوق حق انتفاع را فقط درباره ي شخص یا اشخاصی می توان برقرار کرد
      که در حین ایجاد حق مزبور وجود داشته باشند ولی ممکن است حق انتفاع تبعاً براي
      کسانی هم که در حین عقد به وجود نیامده اند برقرار شود و مادامی که صاحبان حق انتفاع
      موجود هستند حق مزبور باقی و بعد از انقراض آن ها حق زایل می گردد .
  - number: 46
    text: حق انتفاع ممکن است فقط نسبت به مالی برقرار شود که استفاده از آن با بقاي
      عین ممکن باشد اعم از این که مال م زبور منقول باشد یا غیرمنقول و مشاع باشد یا
      مفروز .
  - number: 47
    text: در حبس، اعم از عمري و غیره، قبض شرط صحت است .
  - number: 48
    text: منتفع باید از مالی که موضوع حق انتفاع است سوءاستفاده نکرده و در حفاظت آن
      تعدي یا تفریط ننماید .
  - number: 49
    text: مخارج لازمه براي نگاهداري مالی که موضوع انتفاع است بر عهده ي منتفع نیست
      مگر اینکه خلاف آن شرط باشد .
  - number: 50
    text: اگر مالی که موضوع حق انتفاع است، بدون تعدي یا تفریط منتفع، تلف شود، مشارالیه
      مسئول آن نخواهد بود . ٧
- id: madani-51-101
  title: مواد 51 تا 101 قانون مدنی
  from: 51
  to: 101
  articles:
  - number: 51
    text: 'حق انتفاع در موارد ذیل زایل می شود : 1 - در صورت انقضا مدت 2 - در صورت
      تلف شدن مال ی که موضوع انتفاع است .'
  - number: 52
    text: 'در موارد ذیل منتفع، ضامن تضررات مالک است : 1 - در صورتی که منتفع از مال
      موضوع انتفاع سوءاستفاده کند . 2 - در صورتی که شرایط مقرره از طرف مالک را رعایت
      ننماید و این عدم رعایت موجب خسارتی بر موضوع حق انتفاع باشد .'
  - number: 53
    text: انتقال ع ین از طرف مالک به غیر، موجب بطلان حق انتفاع نمی شود، ولی اگر منتقل
      الیه، جاهل باشد که حق انتفاع متعلق به دیگري است، اختیار فسخ معامله را خواهد
      داشت .
  - number: 54
    text: سایر کیفیات انتفاع از مال دیگري به نحوي خواهد بود که مالک قرار داده یا عرف
      و عادت اقتضا بنماید . م بحث دوم - در وقف
  - number: 55
    text: وقف عبارت است از این که عین مال، حبس و منافع آن تسبیل شود .
  - number: 56
    text: وقف واقع می شود به ایجاب از طرف واقف به هر لفظی که صراحتاً دلالت بر معنی
      آن کند و قبول طبقه اول از موقوف علیهم یا قائم مقام قانونی آن ها در صورتی که
      محصور باشند مث ل وقف بر اولاد و اگر موقوف علیهم غیرمحصور یا وقف بر مصالح عامه
      باشد در این صورت قبول حاکم، شرط است .
  - number: 57
    text: واقف باید مالک مالی باشد که وقف می کند و به علاوه داراي اهلیتی باشد که در
      معاملات، معتبر است .
  - number: 58
    text: فقط وقف مالی جایز است که با بقاي عین بتوان از آن منتفع شد اعم از این که
      منقول باشد یا غیرمنقول، مشاع باشد یا مفروز .
  - number: 59
    text: اگر واقف، عین موقوفه را به تصرف وقف ندهد وقف محقق نمی شود و هر وقت به قبض
      داد ٨ وقف تحقق پیدا می کند .
  - number: 60
    text: در قبض، فوریت شرط نیست بلکه مادامی که واقف رجوع از وقف نکرده است هر وقت
      قبض بدهد وقف تمام می شود .
  - number: 61
    text: وقف، بعد از وقوع آن به نحو صحت و حصول قبض، لازم است و واقف نمی تواند از
      آن رجوع کند یا در آن تغییري بدهد یا از موقوف علیهم کسی را خارج کند یا کسی را
