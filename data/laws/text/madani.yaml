  - number: 246
    text: در صورتی که معامله به واسطه ي اقاله یا فسخ به هم بخورد شرطی که در ضمن آن
      شده است باطل می شو د و اگر کسی که ملزم به انجام آن شرط بوده است عمل به شرط کرده
      باشد می تواند عوض او را از مشروط له بگیرد . فصل پنجم - در معاملاتی که موضوع
      آن مال غیر است یا معاملات فضولی
  - number: 247
    text: معامله به مال غیر، جز به عنوان ولایت یا وصایت یا وکالت، نافذ نیست ولو این
      که صاحب مال باطناً راضی باشد ولی اگر مالک یا قائم مقام او پس از وقوع معامله
      آن را اجازه نمود در این صورت معامله، صحیح و نافذ می شود .
  - number: 248
    text: اجازه ي مالک نسبت به معامله فضولی حاصل می شود به لفظ یا فعلی که دلالت بر
      امضاي عقد نماید .
  - number: 249
    text: ٠٣ سکوت مالک ولو با حضور در مجلس عقد، اجازه محسوب نمی شود .
  - number: 250
    text: اجازه در صورتی مؤثر است که مسبوق به رد نباشد والا اثري ندارد .
  - number: 251
    text: رد معامله ي فضولی حاصل می شود به هر لفظ یا فعلی که دلالت بر عدم رضاي به
      آن نماید .
  - number: 252
    text: لازم نیست اجازه یا رد فوري باشد . اگر تأخیر مو جب تضرر طرف اصیل باشد مشارالیه
      می تواند معامله را به هم بزند .
- id: madani-253-303
  title: مواد 253 تا 303 قانون مدنی
  from: 253
  to: 303
  articles:
  - number: 253
    text: در معامله ي فضولی اگر مالک قبل از اجازه یا رد فوت نماید اجازه یا رد، با
      وارث است .
  - number: 254
    text: هر گاه کسی نسبت به مال غیر معامله نماید و بعد آن مال، به نحوي از انحا به
      معامله کننده ي فضولی منتقل شود، صرف تملک موجب نفوذ معامله ي سابقه نخواهد بود
      .
  - number: 255
    text: ،هر گاه کسی نسبت به مالی، معامله به عنوان فضولی نماید و بعد معلوم شود که
      آن مال ملک معامله کننده بوده است یا ملک کسی بوده است که معامله کننده می توانسته
      است از قِبل او ولایتاً یا وکالتاً م عامله نماید در این صورت نفوذ و صحت معامله
      موکول به اجازه ي معامل است والا معامله باطل خواهد بود .
  - number: 256
    text: هر گاه کسی مال خود و مال غیر را به یک عقدي منتقل کند یا انتقال مالی را براي
      خود و دیگري قبول کند معامله نسبت به خود او نافذ و نسبت به غیر، فضولی است .
  - number: 257
    text: اگر عین مالی که موضوع معامله ي فضولی بوده است قبل از این که مالک، معامله
      ي فضولی را اجازه یا رد کند مورد معامله دیگر نیز واقع شود مالک می تواند هر یک
      از معاملات را که بخواهد اجازه کند . در این صورت هر یک را اجازه کرد، معاملات
      بعد از آن نافذ و سابق بر آن باطل خواهد بود .
  - number: 258
    text: نسبت به منافع مالی که مورد معامله ي فضولی بوده است و همچنین نسبت به منافع
      حاصله از عوض آن، اجازه یا رد از روز عقد مؤثر خواهد بود .
  - number: 259
    text: ١٣ هر گاه معامل فضولی، مالی را که موضوع معامله بوده است به تصرف متعامل داده
      باشد و مالک، آن معامله را اجازه نکند، متصرف ، ضامن عین و منافع است .
  - number: 260
    text: در صورتی که معامل فضولی، عوض مالی را که موضوع معامله بوده است گرفته و در
      نزد خود داشته باشد و مالک با اجازه معامله، قبض عوض را نیز اجازه کند دیگر حق
      رجوع به طرف دیگر نخواهد داشت .
  - number: 261
    text: د ر صورتی که مبیع فضولی به تصرف مشتري داده شود هر گاه مالک، معامله را اجازه
      نکرد مشتري نسبت به اصل مال و منافع مدتی که در تصرف او بوده ضامن است اگر چه منافع
      را استیفا نکرده باشد و همچنین است نسبت به هر عیبی که در مدت تصرف مشتري، حادث
      شده باشد .
  - number: 262
    text: در مو رد ماده ي قبل، مشتري حق دارد که براي استرداد ثمن، عیناً یا مثلاً یا
      قیمتاً به بایع فضولی رجوع کند .
  - number: 263
    text: هر گاه مالک، معامله را اجازه نکند و مشتري هم بر فضولی بودن آن جاهل باشد
      حق دارد که براي ثمن و کلیه ي غرامات به بایع فضولی رجوع کند و در صورت عالم بو
      دن، فقط حق رجوع براي ثمن را خواهد داشت . فصل ششم - در سقوط تعهدات
  - number: 264
    text: 'تعهدات به یکی از طرق ذیل ساقط می شود : 1 - به وسیله ي وفاي به عهد 2 - به
      وسیله ي اقاله 3 - به وسیله ي ابراء 4 - به وسیله ي تبدیل تعهد 5 - به وسیله ي
      تهاتر 6 - به وسیله ي مالکیت مافی الذمه مبحث اول - در وفاي به عهد'
  - number: 265
    text: هر کس مالی به دیگري بدهد ظاهر، در عدم تبرع است بنابراین اگر کسی چیزي به
      دیگري بدهد بدون این که مقروض آن چیز باشد می تواند استرداد کند . ٢٣
  - number: 266
    text: در مورد تعهداتی که براي متعهدله، قانوناً حق مطالبه نمی باشد اگر متعهد به
      م یل خود آن را ایفا نماید دعوي استرداد او مسموع نخواهد بود .
  - number: 267
    text: ایفاي دین از جانب غیر مدیون هم جایز است اگر چه از طرف مدیون اجازه نداشته
      باشد ولیکن کسی که دین دیگري را ادا می کند اگر با اذن باشد حق مراجعه به او دارد
      والا حق رجوع ندارد .
  - number: 268
    text: انجام فع لی در صورتی که مباشرت شخص متعهد شرط شده باشد به وسیله ي دیگري ممکن
      نیست مگر با رضایت متعهدله .
  - number: 269
    text: وفاي به عهد وقتی محقق می شود که متعهد، چیزي را که می دهد، مالک و یا مأذون
      از طرف مالک باشد و شخصاً هم اهلیت داشته باشد .
  - number: 270
    text: اگر متعهد در مقام وفا ي به عهد، مالی تأدیه نماید دیگر نمی تواند به عنوان
      این که در حین تأدیه، مالک آن نبوده استرداد آن را از متعهدله بخواهد مگر این که
      ثابت کند که مال غیر و با مجوز قانونی در ید او بوده، بدون این که اذن در تأدیه
      داشته باشد .
  - number: 271
    text: دین باید به شخص داین یا به ک سی که از طرف او وکالت دارد تأدیه گردد یا به
      کسی که قانوناً حق قبض دارد .
  - number: 272
    text: تأدیه به غیر اشخاص مذکور در ماده ي فوق وقتی صحیح است که داین راضی شود .
  - number: 273
    text: اگر صاحب حق از قبول آن امتناع کند متعهد به وسیله ي تصرف دادن آن به حاکم
      یا قائم مقام او بري می شود و از تاریخ این اقدام، مسئول خسارتی که ممکن است به
      موضوع حق وارد آید نخواهد بود .
  - number: 274
    text: اگر متعهدله اهلیت قبض نداشته باشد تأدیه در وجه او معتبر نخواهد بود .
  - number: 275
    text: متعهدله را نمی توان مجبور نمود که چیز دیگري به غیر آن چه که موضوع تعهد است
      قبول نماید اگر چه آن شئ، قیمتاً معادل یا بیشتر از موضوع تعهد باشد . ٣٣
  - number: 276
    text: مدیون نمی تواند مالی را که از طرف حاکم ممنوع از تصرف در آن شده است در مقام
      وفاي به عهد تأدیه نماید .
  - number: 277
    text: متعهد نمی تواند متعهدله را مجبور به قبول قسمتی از موضوع تعهد نماید ولی حاکم
      تو می اند نظر به وضعیت مدیون، مهلت عادله یا قرار اقساط دهد .
  - number: 278
    text: اگر موضوع تعهد عین معینی باشد، تسلیم آن به صاحبش در وضعیتی که حین تسلیم
      دارد موجب برائت متعهد می شود اگر چه کسر و نقصان داشته باشد، مشروط بر این که
      کسر و نقصان از تعدي و تفریط متعهد ناشی نشده ب اشد، مگر در مواردي که در این قانون
      تصریح شده است . ولی اگر متعهد با انقضاي اجل و مطالبه، تأخیر در تسلیم نموده باشد
      مسئول هر کسر و نقصان خواهد بود اگر چه کسر و نقصان، مربوط به تقصیر شخص متعهد
      نباشد .
  - number: 279
    text: اگر موضوع تعهد عین شخصی نبوده و کلی باشد متعهد مج بور نیست که از فرد اعلاي
      آن ایفا کند، لیکن از فردي هم که عرفاً معیوب محسوب است نمی تواند بدهد .
  - number: 280
    text: انجام تعهد باید در محلی که عقد واقع شده به عمل آید مگر این که بین متعاملین
      قرارداد مخصوصی باشد یا عرف و عادت، ترتیب دیگري اقتضا نماید .
  - number: 281
    text: مخارج تأ دیه به عهده ي مدیون است مگر این که شرط خلاف شده باشد .
  - number: 282
    text: اگر کسی به یک نفر دیون متعدده داشته باشد، تشخیص این که تأدیه از بابت کدام
      دین است با مدیون می باشد . مبحث دوم - در اقاله
  - number: 283
    text: بعد از معامله، طرفین می توانند به تراضی آن را اقاله و تفاسخ کنند .
  - number: 284
    text: اقاله به هر لفظ یا فعلی واقع می شود که دلالت بر به هم زدن معامله کند .
  - number: 285
    text: موضوع اقاله ممکن است تمام معامله واقع شود یا فقط مقداري از مورد آن . ٤٣
  - number: 286
    text: تلف یکی از عوضین، مانع اقاله نیست در این صورت به جاي آن چیزي که تلف شده
      است، مثل آن در ص ورت مثلی بودن و قیمت آن در صورت قیمی بودن داده می شود .
  - number: 287
    text: نماات و منافع منفصله که از زمان عقد تا زمان اقاله در مورد معامله حادث می
      شود مال کسی است که به واسطه ي عقد مالک شده است ولی نماات متصله مال کسی است که
      در نتیجه ي اقاله، مالک می شود .
  - number: 288
    text: اگر مالک، بعد از عقد در مورد معامله تصرفاتی کند که موجب ازدیاد قیمت آن شود،
      در حین اقاله به مقدار قیمتی که به سبب عمل او زیاد شده است مستحق خواهد بود .
      مبحث سوم - در ابرا
  - number: 289
    text: ابرا عبارت از این است که دائن از حق خود به اختیار صرف نظر نماید .
  - number: 290
    text: ابر ا وقتی موجب سقوط تعهد می شود که متعهدله براي ابرا اهلیت داشته باشد .
  - number: 291
    text: ابراي ذمه ي میت از دین صحیح است . مبحث چهارم - در تبدیل تعهد
  - number: 292
    text: 'تبدیل تعهد در موارد ذیل حاصل می شود : 1 - وقتی که متعهد و متعهدله به تبدیل
      تعهد اصلی به تعهد جدیدي که قائم مقام آن می شود به سببی از اسباب، تراضی نمایند
      در این صورت متعهد نسبت به تعهد اصلی بري می شود . 2 - وقتی که شخص ثالثی با رضایت
      متعهدله قبول کند که دین متعهد را ادا نماید . 3 - وقتی که متعهدله مافی الذمه
      ي متعهد را به کسی دیگر منتقل نماید .'
  - number: 293
    text: در تبدیل تعه د، تضمینات تعهد سابق به تعهد لاحق تعلق نخواهد گرفت مگر این
      که طرفین معامله آن را صراحتاً شرط کرده باشند . مبحث پنجم - در تهاتر
  - number: 294
    text: وقتی دو نفر در مقابل یکدیگر مدیون باشند بین دیون آن ها به یکدیگر به طریقی
      که در ٥٣ مواد ذیل مقرر است تهاتر حاصل می شود . ما ده 295 تهاتر، قهري است و بدون
      این که طرفین در این موضوع تراضی نمایند حاصل می گردد . بنابراین به محض این که
      دو نفر در مقابل یکدیگر در آن واحد مدیون شدند هر دو دین تا اندازه اي که با هم
      معادله می نمایند به طور تهاتر برطرف شده و طرفین به مقدار آن در مقابل یکدی گر
      بري می شوند .
  - number: 296
    text: تهاتر فقط در مورد دو دینی حاصل می شود که موضوع آن ها از یک جنس باشد، با
      اتحاد زمان و مکان تأدیه ولو به اختلاف سبب .
  - number: 297
    text: اگر بعد از ضمان، مضمون له به مضمون عنه مدیون شود، موجب فراغ ذمه ي ضامن نخواهد
      .شد
  - number: 298
    text: اگر فقط محل تأد یه دینین، مختلف باشد تهاتر وقتی حاصل می شود که با تأدیه
      ي مخارج مربوط به نقل موضوع قرض از محلی به محل دیگر یا به نحوي از انحا، طرفین
      ، حق تأدیه در محل معین را ساقط نمایند .
  - number: 299
    text: در مقابل حقوق ثابته ي اشخاص ثالث، تهاتر مؤثر نخواهد بود و بنابراین اگر موضو
      ع دین به نفع شخص ثالثی در نزد مدیون مطابق قانون توقیف شده باشد و مدیون بعد از
      این توقیف از دائن خود طلبکار گردد دیگر نمی تواند به استناد تهاتر، از تأدیه ي
      مال توقیف شده امتناع کند . مبحث ششم - مالکیت مافی الذمه
  - number: 300
    text: اگر مدیون، مالک مافی الذمه ي خود گر دد ذمه ي او بري می شود، مثل این که اگر
      کسی به مورث خود مدیون باشد پس از فوت مورث، دین او به نسبت سهم الارث ساقط می
      شود . باب دوم - در الزاماتی که بدون قرارداد حاصل می شود فصل اول - در کلیات
  - number: 301
    text: کسی که عمداً یا اشتباهاً چیزي را که مستحق نبوده است دریافت کند ملزم است
      که آن را به مالک تسلیم کند .
  - number: 302
    text: ٦٣ اگر کسی که اشتباهاً خود را مدیون می دانست آن دین را تأدیه کند حق دارد
      از کسی که آن را بدون حق، اخذ کرده است استرداد نماید .
  - number: 303
    text: کسی که مالی را مِن غیر حق، دریافت کرده است ضامن عین و منافع آن است اعم از
      این که به عدم استحقاق خود عالم باشد یا جاهل .
- id: madani-304-353
  title: مواد 304 تا 353 قانون مدنی
  from: 304
  to: 353
  articles:
  - number: 304
    text: اگر کسی که چیزي را مِن غیر حق دریافت کرده است خود را محق می دانسته لیکن
      در واقع محق نبوده و آن چیز را فروخته باشد، معامله، فضولی و تابع احکام مربوطه
      به آن خواهد بود .
  - number: 305
    text: در مورد مواد فوق صاحب م ال باید از عهده ي مخارج لازمه که براي نگاهداري آن
      شده است بر آید مگر در صورت علم متصرف به عدم استحقاق خود .
  - number: 306
    text: اگر کسی اموال غایب یا محجور و امثال آن ها را بدون اجازه ي مالک یا کسی که
      حق اجازه دارد اداره کند باید حساب زمان تصدي خود را بدهد . در صورتی ک ه تحصیل
      اجازه در موقع، مقدور بوده یا تأخیر در دخالت موجب ضرر نبوده است حق مطالبه ي مخارج
      نخواهد داشت ولی اگر عدم دخالت یا تأخیر در دخالت موجب ضرر صاحب مال باشد دخالت
      کننده، مستحق اخذ مخارجی خواهد بود که براي اداره کردن لازم بوده است . فصل دوم
      - در ضمان قه ري
  - number: 307
    text: 'امور ذیل موجب ضمان قهري است : 1 - غصب و آن چه که در حکم غصب است . 2 - اتلاف
