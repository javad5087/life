      یا زیادتر از ثمن معامله باشد نسبت بین قیمت مبیع در حال معیوبی و قیمت آن در حال
      بی عیبی معین شده و بایع باید از ثمن مقرر به همان نسبت نگاهداشته و بقیه را به
      عنوان ارش به مشتري رد کند .'
