  - number: 431
    text: در صورتی که در یک عقد، چند چیز فروخته شود بدون این که قیمت هر یک علی حده
      معین شده باشد و بعضی از آن ها معیوب در آید مشتري باید تمام آن را رد کند و ثمن
      را مسترد دارد یا تمام را نگاه دارد و ارش بگیرد و تبعیض نمی تواند بکند مگر به
      رضا ي بایع .
  - number: 432
    text: در صورتی که در یک عقد، بایع یک نفر و مشتري متعدد باشد و درمبیع عیبی ظاهر
      شود یکی از مشتري ها نمی تواند سهم خود را به تنهایی رد کند و دیگري سهم خود را
      نگاه دارد مگر با رضاي بایع و بنابراین اگر در رد مبیع اتفاق نکردند فقط هر یک
      از آن ها حق ا رش خواهد داشت .
  - number: 433
    text: اگر در یک عقد، بایع متعدد باشد مشتري می تواند سهم یکی را رد و دیگري را با
      اخذ ارش قبول کند .
  - number: 434
    text: اگر ظاهر شود که مبیع معیوب، اصلاً مالیات و قیمت نداشته، بیع باطل است و اگر
      بعض مبیع قیمت نداشته باشد بیع نسبت به آن بعض باطل است و مشتري نسبت به باقی از
      جهت تبعض صفقه اختیار فسخ دارد .
  - number: 435
    text: خیار عیب بعد از علم به آن، فوري است .
  - number: 436
    text: اگر بایع از عیوب مبیع، تبري کرده باشد به این که عهده ي عیوب را از خود سلب
      کرده یا با تمام عیوب بفروشد مشتري در صورت ظهور عیب حق رجوع به بایع نخواهد داشت
      و اگر بایع از عیب خاصی تبرّي کرده باشد فقط نسبت به همان عیب حق مراجعه ندارد
      .
  - number: 437
    text: از حیث احکام عیب، ثمن شخصی مثل مبیع شخصی است . هشتم - در خیار تدلیس ٢٥
  - number: 438
    text: تدلیس عبارت است از عملیاتی که موجب فریب طرف معامله شود .
  - number: 439
    text: اگر بایع، تدلیس نموده با شد مشتري حق فسخ بیع را خواهد داشت و همچنین است
      بایع نسبت به ثمن شخصی در صورت تدلیس مشتري .
  - number: 440
    text: خیار تدلیس بعد از علم به آن، فوري است . نهم - در خیار تبعض صفقه
  - number: 441
    text: خیار تبعض صفقه وقتی حاصل می شود که عقد بیع نسبت به بعض مبیع به جهتی از جهات
      باطل باشد در این صورت مشتري حق خواهد داشت بیع را فسخ نماید یا به نسبت قسمتی
      که بیع واقع شده است قبول کند و نسبت به قسمتی که بیع باطل بوده است ثمن را استرداد
      کند .
  - number: 442
    text: 'در مورد تبعض صفقه قسمتی از ثمن که باید به مشتري برگردد به طریق ذیل حساب
      می شود : آن قسمت از مبی ع که به ملکیت مشتري قرار گرفته منفرداً قیمت می شود و
      هر نسبتی که بین قیمت مزبور و قیمتی که مجموع مبیع در حال اجتماع دارد پیدا شود
      به همان نسبت از ثمن را بایع نگاه داشته و بقیه را باید به مشتري رد نماید .'
  - number: 443
    text: تبعض صفقه وقتی موجب خیار است که مشتري در حین معامله عالم به آن نباشد ولی
      در هر حال ثمن تقسیط می شود . دهم - در خیار تخلف شرط
  - number: 444
    text: احکام خیار تخلف شرط به طوري است که در مواد234 الی245 ذکر شده است . فقره
      دوم - در احکام خیارات به طور کلی
  - number: 445
    text: هر یک از خیارات، بعد از فوت، منتقل به وارث می شود . م اده 446 خیار شرط ممکن
      است به قید مباشرت و اختصاص به شخص مشروط له قرار داده شود در این صورت منتقل به
      وارث نخواهد شد . ٣٥
  - number: 447
    text: هر گاه شرط خیار براي شخصی غیر از متعاملین شده باشد منتقل به ورثه نخواهد
      شد .
  - number: 448
    text: سقوط تمام یا بعضی از خیارات را می توان در ضمن عقدشرط نمود .
  - number: 449
    text: فسخ به هر لفظ یا فعلی که دلالت بر آن نماید حاصل می شود .
  - number: 450
    text: تصرفاتی که نوعاً کاشف از رضاي به معامله باشد امضاي فعلی است، مثل آن که مشتري
      که خیار دارد با علم به خیار، مبیع را بفروشد یا رهن بگذارد .
  - number: 451
    text: تصرفاتی که نوعاً کاشف از به هم زدن معامله باشد، فسخ فعلی است .
  - number: 452
    text: اگر متعاملین هر دو خیار داشته باشند و یکی از آن ها امضا کند و دیگري فسخ
      نماید معامله منفسخ می شود .
  - number: 453
    text: ،در خیار مجلس و حیوان و شرط اگر مبیع بعد از تسلیم و در زمان خیار بایع یا
      متعاملین تلف یا ناقص شود بر عهده ي مشتري است و اگر خیار، مختص مشتري باشد تلف
      یا نقص به عهده بایع است .
- id: madani-454-503
  title: مواد 454 تا 503 قانون مدنی
  from: 454
  to: 503
  articles:
  - number: 454
    text: هر گاه مشتري مبیع را اجاره داده باشد و بیع فسخ شود اجاره باطل نمی شود مگر
      این که عدم تصرفات ناقله در عین و منفعت بر مشتري صریحاً یا ضمناً شرط شده که در
      این صورت اجاره باطل ا ست .
  - number: 455
    text: اگر پس از عقد بیع، مشتري تمام یا قسمتی از مبیع را متعلق حق غیر قرار دهد
      مثل این که نزد کسی رهن گذارد، فسخ معامله موجب زوال حق شخص مزبور نخواهد شد مگر
      این که شرط خلاف شده باشد .
  - number: 456
    text: تمام انواع خیار در جمیع معاملات لازمه ممکن است موجود باشد مگر خیار مجلس
      و حیوان و تأخیر ثمن که مخصوص بیع است .
  - number: 457
    text: هر بیع، لازم است مگر این که یکی از خیارات در آن ثابت شود . ٤٥ فصل دوم -
      در بیع شرط
  - number: 458
    text: در عقد بیع، متعاملین می توانند شرط نمایند که هر گاه بایع در مدت معینی تمام
      مثل ثمن را به مشتري رد کند خیار فسخ معامله را نسبت به تمام مبیع داشته باشد و
      همچنین می توانند شرط کنند که هر گاه بعض مثل ثمن را رد کرد خیار فسخ معامله را
      نسبت به تمام یا بعض مبیع داشته باشد در هر حال حق خیار، تابع قرارداد متعاملین
      خواهد بود و هر گاه نسبت به ثمن، قید تمام یا بعض نشده باشد خیار، ثابت نخواهد
      بود مگر با رد تمام ثمن .
  - number: 459
    text: در بیع شرط به مجرد عقد، مبیع ملک مشتري می شود با قید خیار براي بایع . بنابراین
      اگر بایع به شرایطی که بین او و مشتري براي استرداد مبیع مقرر شده است عمل ننماید
      بیع، قطعی شده و مشتري مالک قطعی مبیع می گردد و اگر بالعکس بایع به شرایط مزبوره
      عمل نماید و مبیع را استرداد کند از حین فسخ، مبیع مال بایع خواهد شد ولی نماات
      و منافع حاصله از حین عقد تا حین فسخ مال مشتري است .
  - number: 460
    text: در بیع شرط، مشتري نمی تواند در مبیع تصرفی که منافی خیار باشد از قبیل نقل
      و انتقال و غیر ه بنماید .
  - number: 461
    text: اگر مشتري در زمان خیار از اخذ ثمن خودداري کند بایع می تواند با تسلیم ثمن
      به حاکم یا قائم مقام او معامله را فسخ کند .
  - number: 462
    text: اگر مبیع به شرط، به واسطه ي فوت مشتري به ورثه ي او منتقل شود حق فسخ بیع
      در مقابل ورثه به همان ترتیبی که بوده است باقی خواهد بود .
  - number: 463
    text: اگر در بیع شرط، معلوم شود که قصد بایع، حقیقت بیع نبوده است احکام بیع در
      آن مجري نخواهد بود . فصل سوم - در معاوضه
  - number: 464
    text: معاوضه عقدي است که به موجب آن یکی از طرفین، مالی می دهد به عوض مال دیگر
      که از طرف دیگر اخذ می کند بدون ملاحظه ي این که یکی از عوضین، مبیع و دیگري ثمن
      باشد . ٥٥
  - number: 465
    text: در معاوضه، احکام خاصه ي بیع جاري نیست . فصل چهارم - در اجاره
  - number: 466
    text: اجاره عقدي است که به موجب آن، مستأجر، مالک منافع عین مستأجره می شود، اجاره
      دهنده را موجر و اجاره کننده را مستأجر و مورد اجاره را عی ن مستأجره گویند .
  - number: 467
    text: مورد اجاره ممکن است اشیا یا حیوان یا انسان باشد . مبحث اول - در اجاره اشیا
  - number: 468
    text: در اجاره ي اشیا، مدت اجاره باید معین شود و الا اجاره باطل است .
  - number: 469
    text: مدت اجاره از روزي شروع می شود که بین طرفین مقرر شده و اگر در عقد اجاره،
      ابت داي مدت ذکر نشده باشد از وقت عقد محسوب است .
  - number: 470
    text: در صحت اجاره، قدرت بر تسلیم عین مستأجره شرط است .
  - number: 471
    text: براي صحت اجاره باید انتفاع از عین مستأجره با بقاي اصل آن ممکن باشد .
  - number: 472
    text: عین مستأجره باید معین باشد و اجاره عین مجهول یا مردد باطل است .
  - number: 473
    text: لازم نیست که موجر، مالک عین مستأجره باشد ولی بایدمالک منافع آن باشد .
  - number: 474
    text: مستأجر می تواند عین مستأجره را به دیگري اجاره دهد مگر این که در عقد اجاره
      خلاف آن شرط شده باشد .
  - number: 475
    text: اجاره ي مال مشاع، جایز است لیکن تسلیم عین مستأجره موقوف است به اذن شر یک
      .
  - number: 476
    text: موجر باید عین مستأجره را تسلیم مستأجر کند و در صورت امتناع، موجر اجبار می
      شود و در صورت تعذر اجبار، مستأجر خیار فسخ دارد .
  - number: 477
    text: ٦٥ موجر باید عین مستأجره را در حالتی تسلیم نماید که مستأجر بتواند استفاده
      ي مطلوبه را بکند .
  - number: 478
    text: هر گاه معلوم ش ود عین مستأجره در حال اجاره معیوب بوده، مستأجر می تواند اجاره
      را فسخ کند یا به همان نحوي که بوده است اجاره را با تمام اجرت قبول کند ولی اگر
      موجر رفع عیب کند به نحوي که به مستأجر ضرري نرسد مستأجر حق فسخ ندارد .
  - number: 479
    text: عیبی که موجب فسخ اجاره می شود عیبی است که موجب نقصان منفعت یا صعوبت در انتفاع
      باشد .
  - number: 480
    text: عیبی که بعد از عقد و قبل از قبض منفعت، در عین مستأجره حادث شود موجب خیار
      است و اگر عیب در اثناي مدت اجاره حادث شود نسبت به بقیه ي مدت، خیار ثابت است
      .
  - number: 481
    text: هر گاه عین مستأجره به واسطه ي عیب از قابلی ت انتفاع خارج شده و نتوان رفع
      عیب نمود اجاره باطل می شود .
  - number: 482
    text: اگر مورد اجاره عین کلی باشد و فردي که موجر داده معیوب در آید مستأجر حق فسخ
      ندارد و می تواند موجر را مجبور به تبدیل آن نماید و اگر تبدیل آن ممکن نباشد حق
      فسخ خواهد داشت .
  - number: 483
    text: اگر در مدت اجاره، عین مستأجره به واسطه ي حادثه، کلاً یا بعضاً تلف شود اجاره
      از زمان تلف نسبت به مقدار تلف شده منفسخ می شود و در صورت تلف بعض آن، مستأجر
      حق دارد اجاره را نسبت به بقیه فسخ کند یا فقط مطالبه ي تقلیل نسبی مال الاجاره
      نماید .
  - number: 484
    text: موجر نمی تواند در مدت اجاره، در عین مستأجره تغییري دهد که منافی مقصود مستأجر
      از استیجار باشد .
  - number: 485
    text: اگر در مدت اجاره، در عین مستأجره تعمیراتی لازم آید که تأخیر در آن موجب ضرر
      موجر باشد مستأجر نمی تواند مانع تعمیرات مزبوره گردد اگر چه در مدت تمام یا قسمتی
      از زمان تعمیر نتواند از عین مستأجره کلاً یا بعضاً استفاده نماید . در این صورت
      حق فسخ اجاره را خواهد داشت . ٧٥
  - number: 486
    text: تعمیرات و کلیه ي مخارجی که در عین مستأجره براي امکان انتفاع از آن لازم است
      به عهده ي مالک است مگر آن که شرط خلاف شده یا عرف بلد بر خلاف آن جاري باشد و
      همچنین است آلات و ادواتی که براي امکان انتفاع از عین مستأجره لازم می باشد .
  - number: 487
    text: هر گاه مستأجر نسبت به عین مستأجره تعدي یا تفریط نماید و موجر قادر بر منع
      آن نباشد موجر حق فسخ دارد .
  - number: 488
    text: اگر شخص ثالثی بدون ادعاي حقی در عین مستأجره یا منافع آن، مزاحم مستأجر گردد
      در صورتی که قبل از قبض باشد مستأجر حق فسخ دارد و اگر فسخ ننمود می تواند براي
      رفع مزاحمت و مطالبه ي اجرت المثل به خود مزاحم رجوع کند و اگرمزاحمت بعد از قبض
      واقع شود حق فسخ ندارد و فقط می تواند به مزاحم رجوع کند .
  - number: 489
    text: اگر شخصی که مزاحمت می نماید مدعی حق نسبت به عین مستأجره یا منافع آن باشد
      مزاحم نمی تواند عین مزبور را از ید مستأجر آن تزاع نماید مگر بعد از اثبات حق
      با طرفیت مالک و مستأجر هر دو .
  - number: 490
    text: 'مستأجر باید ً : اولا- در استعمال عین مستأجره به نحو متعارف رفتار کرده و
      تعدي یا تفریط نکند ً . ثانیا- عین م ستأجره را براي همان مصرفی که در اجاره مقرر
      شده و در صورت عدم تعیین در منافع مقصوده که از اوضاع و احوال استنباط می شود استعمال
      نماید ً . ثالثا – مال الاجاره را در مواعدي که بین طرفین مقرر است تأدیه کند و
      در صورت عدم تعیین موعد، نقداً باید بپردازد .'
  - number: 491
    text: اگر منفعتی که در اجاره تعیین شده است به خصوصیت آن، منظور نبوده مستأجر می
      تواند استفاده منفعتی کند که از حیث ضرر، مساوي یا کمتر از منفعت معینه باشد .
  - number: 492
    text: اگر مستأجر، عین مستأجره را در غیر موردي که در اجاره ذکر شده باشد یا از اوضاع
      و احوال استنباط می شود اس تعمال کند و منع آن ممکن نباشد موجر حق فسخ اجاره را
      خواهد داشت .
  - number: 493
    text: ٨٥ مستأجر نسبت به عین مستأجره ضامن نیست به این معنی که اگر عین مستأجره بدون
      تفریط یا تعدي او کلاً یا بعضاً تلف شود مسئول نخواهد بود ولی اگر مستأجر تفریط
      یا تعدي نماید ضامن است اگر چه نقص در نتیجه ي تفریط یا تعدي حاصل نشده باشد .
  - number: 494
    text: عقد اجاره به محض انقضاي مدت برطرف می شود و اگر پس از انقضاي آن، مستأجر،
      عین مستأجره را بدون اذن مالک مدتی در تصرف خود نگاه دارد موجر براي مدت مزبور
      مستحق اجرت المثل خواهد بود اگر چه مستأجر استیفاي منفعت نکر ده باشد و اگر با
      اجازه ي مالک در تصرف نگاه دارد وقتی باید اجرت المثل بدهد که استیفاي منفعت کرده
      باشد مگر این که مالک اجازه داده باشدکه مجاناً استفاده نماید .
  - number: 495
    text: اگر براي مال الاجاره، ضامنی داده شده باشد ضامن مسئول اجرت المثل مذکور در
      ماده ي فوق نخواهد بود .
  - number: 496
